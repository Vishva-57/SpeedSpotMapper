<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpeedSpot Mapper | Premium Internet Mapping</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <span class="pulse"></span>
                <h1>SpeedSpot <span>Mapper</span></h1>
            </div>
            <div class="status-pill" id="network-status">
                <span class="dot"></span> Detecting...
            </div>
            <div id="carrier-pill" class="status-pill" style="display:none">
                <span class="icon">📶</span> <span id="carrier-name">Unknown</span>
            </div>
        </header>

        <main id="main-content">
            <div id="map"></div>

            <!-- Routing Overlay (Initially Hidden) -->
            <div id="routing-panel" class="routing-overlay" style="display: none;">
                <div class="route-header">
                    <span class="icon" style="font-size: 1.5rem;">🧭</span>
                    <h3>Navigation Mode</h3>
                </div>

                <p class="route-instr">Move <strong><span id="route-dist"></span>m</strong> <span id="route-dir"></span>
                </p>

                <div class="route-stat-box">
                    <span class="route-stat-label">Expected Download</span>
                    <div class="route-stat-value">
                        <span id="route-dl">--</span>
                        <span class="unit">Mbps</span>
                    </div>
                </div>

                <div class="route-stat-box" style="margin-bottom: 24px;">
                    <span class="route-stat-label">Expected Upload</span>
                    <div class="route-stat-value">
                        <span id="route-ul">--</span>
                        <span class="unit">Mbps</span>
                    </div>
                </div>

                <button id="exit-routing-btn" class="exit-nav-btn">
                    <span class="icon">✖</span> Exit Navigation
                </button>
            </div>

            <div class="dashboard">
                <div class="stats-grid">
                    <!-- Download Speedometer -->
                    <div class="speedometer-card" id="dl-speedometer">
                        <svg viewBox="0 0 200 130" class="speedo-svg">
                            <!-- Background track arc (220° sweep) -->
                            <path class="speedo-track" d="M 20 115 A 80 80 0 1 1 180 115" fill="none"
                                stroke="rgba(255,255,255,0.08)" stroke-width="14" stroke-linecap="round" />
                            <!-- Coloured fill arc (animated) -->
                            <path class="speedo-fill" id="dl-arc" d="M 20 115 A 80 80 0 1 1 180 115" fill="none"
                                stroke="url(#dlGradient)" stroke-width="14" stroke-linecap="round"
                                stroke-dasharray="0 502" />
                            <!-- Gradient for download arc -->
                            <defs>
                                <linearGradient id="dlGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                                    <stop offset="0%" stop-color="#6366f1" />
                                    <stop offset="100%" stop-color="#10b981" />
                                </linearGradient>
                            </defs>
                            <!-- Needle -->
                            <line id="dl-needle" x1="100" y1="100" x2="100" y2="30" stroke="white" stroke-width="2.5"
                                stroke-linecap="round" transform="rotate(-110, 100, 100)" opacity="0.9" />
                            <!-- Centre dot -->
                            <circle cx="100" cy="100" r="5" fill="white" opacity="0.9" />
                            <!-- Speed text -->
                            <text id="dl-speed" x="100" y="95" text-anchor="middle" class="speedo-value">--</text>
                            <text x="100" y="112" text-anchor="middle" class="speedo-unit">Mbps ↓</text>
                        </svg>
                        <div class="speedo-label">Download</div>
                    </div>

                    <!-- Upload Speedometer -->
                    <div class="speedometer-card" id="ul-speedometer">
                        <svg viewBox="0 0 200 130" class="speedo-svg">
                            <path class="speedo-track" d="M 20 115 A 80 80 0 1 1 180 115" fill="none"
                                stroke="rgba(255,255,255,0.08)" stroke-width="14" stroke-linecap="round" />
                            <path class="speedo-fill" id="ul-arc" d="M 20 115 A 80 80 0 1 1 180 115" fill="none"
                                stroke="url(#ulGradient)" stroke-width="14" stroke-linecap="round"
                                stroke-dasharray="0 502" />
                            <defs>
                                <linearGradient id="ulGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                                    <stop offset="0%" stop-color="#f59e0b" />
                                    <stop offset="100%" stop-color="#ef4444" />
                                </linearGradient>
                            </defs>
                            <line id="ul-needle" x1="100" y1="100" x2="100" y2="30" stroke="white" stroke-width="2.5"
                                stroke-linecap="round" transform="rotate(-110, 100, 100)" opacity="0.9" />
                            <circle cx="100" cy="100" r="5" fill="white" opacity="0.9" />
                            <text id="ul-speed" x="100" y="95" text-anchor="middle" class="speedo-value">--</text>
                            <text x="100" y="112" text-anchor="middle" class="speedo-unit">Mbps ↑</text>
                        </svg>
                        <div class="speedo-label">Upload</div>
                    </div>

                    <!-- Latency + Signal (kept as stat-cards) -->
                    <div class="stat-card glass">
                        <label>Latency</label>
                        <div class="value" id="ping">--<span>ms</span></div>
                    </div>
                    <div class="stat-card glass">
                        <label>Signal</label>
                        <div class="value" id="signal">--<span>%</span></div>
                    </div>
                </div>

                <div class="action-bar">
                    <div class="test-config glass">
                        <label>Test Source:</label>
                        <span style="font-size: 0.9rem; font-weight: 600;">Public Internet (Real)</span>
                    </div>
                    <button id="scan-btn" class="primary-btn">
                        <span class="icon">📡</span> Scan & Measure
                    </button>
                    <button id="best-sim-btn" class="secondary-btn">
                        <span class="icon">🏆</span> Best SIM for this Area
                    </button>
                    <button id="find-spot-btn" class="secondary-btn">
                        <span class="icon">📍</span> Find Best Spot (5m)
                    </button>
                </div>

            </div>
        </main>
    </div>

    <!-- Modal for Best ISP -->
    <div id="isp-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content glass">
            <button id="close-modal" class="close-btn">&times;</button>
            <h2>Best SIM/ISP for this Area</h2>
            <div id="best-isp-highlight" class="highlight-box">
                <span class="medal">🏆</span> <span id="best-isp-name">Analyzing...</span>
            </div>
            <h3>ISP Rankings (Based on recorded data)</h3>
            <div id="isp-rankings-list" class="rankings-list">
                <!-- Populated by JS -->
            </div>
        </div>
    </div>

    <script>
        function gm_authFailure() {
            console.error("Google Maps authentication failed!");
            alert("Google Maps failed to load. Please check your API Key and ensure 'Maps JavaScript API' is enabled in Google Cloud Console.");
        }

        async function loadMaps() {
            try {
                const res = await fetch('/api/config');
                const config = await res.json();
                const key = config.google_maps_api_key;
                if (!key) {
                    console.error("Google Maps API Key not found in configuration.");
                    alert("Google Maps API Key is missing. Please configure it in your .env file.");
                    return;
                }
                const script = document.createElement('script');
                script.src = `https://maps.googleapis.com/maps/api/js?key=${key}&libraries=visualization&callback=initMap`;
                script.async = true;
                script.defer = true;
                document.head.appendChild(script);
            } catch (e) {
                console.error("Failed to load Google Maps configuration:", e);
            }
        }
        loadMaps();
    </script>
    <script src="script.js"></script>

</body>

</html>
